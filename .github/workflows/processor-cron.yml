name: Processor run

# Manual-only trigger. Use this from the Actions UI when you need to drain
# the notification retry queue, process queued OCR jobs, or run document purges.
#
# Add a schedule trigger here once real user volume creates actual retry pressure.
on:
  workflow_dispatch:

jobs:
  run-processor:
    name: Run processor jobs
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger processor
        env:
          PROCESSOR_SECRET: ${{ secrets.PROCESSOR_SECRET }}
          APP_ORIGIN: https://easydraftdocs.app
        run: |
          response=$(curl --silent --fail-with-body \
            --max-time 55 \
            --retry 2 \
            --retry-delay 5 \
            -X POST "${APP_ORIGIN}/api/processor-run" \
            -H "x-processor-secret: ${PROCESSOR_SECRET}" \
            -H "Content-Type: application/json")

          echo "Response: ${response}"

          ok=$(echo "${response}" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ok','false'))" 2>/dev/null || echo "false")
          if [ "${ok}" != "True" ] && [ "${ok}" != "true" ]; then
            echo "One or more processor job types reported an error. See response above."
            exit 1
          fi
